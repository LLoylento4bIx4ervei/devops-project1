name: Build Docker Image

on:
 push:
  branches: ["main"]

jobs:
 buld:
  runs-on: ubuntu-latest
  steps:
   - name: Checkout code
     uses: actions/checkout@v4


   - name: Set up docker build
     uses: docker/setup-buildx-action@v3


   - name: Build docker image
     uses: docker/build-push-action@v5
     with:
      context: .
      push: false
      tags: flask-conter:ci
      load: true
